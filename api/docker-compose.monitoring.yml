services:
  redis:
    image: redis:7-alpine
    container_name: dbp-redis
    restart: always
    ports:
      - "6390:6379" # Mapeado a 6390 para evitar conflicto con el otro Redis del sistema
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus:latest
    container_name: dbp-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9095:9090" # Mapeado a 9095 para evitar conflicto con Minio (9090)
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana-oss:latest
    container_name: dbp-grafana
    restart: always
    ports:
      - "3010:3000" # Mapeado a 3010 para evitar conflicto con Chatwoot y otros locales
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Cambiar en producción
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
