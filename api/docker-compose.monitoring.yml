services:
  redis:
    image: redis:7-alpine
    container_name: dbp-redis
    restart: always
    # Puertos eliminados por seguridad (Hardening): Ahora solo accesible vía monitor-net
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus:latest
    container_name: dbp-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    # Puertos eliminados por seguridad (Hardening): Ahora solo accesible vía monitor-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.external-url=https://prom.hwperu.com/'
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana-oss:latest
    container_name: dbp-grafana
    restart: always
    ports:
      - "3010:3000" # Mapeado a 3010 para evitar conflicto con Chatwoot y otros locales
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Cambiar en producción
      - GF_SERVER_DOMAIN=grafana.hwperu.com
      - GF_SERVER_ROOT_URL=https://grafana.hwperu.com/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge
    internal: true

volumes:
  prometheus-data:
  grafana-data:
