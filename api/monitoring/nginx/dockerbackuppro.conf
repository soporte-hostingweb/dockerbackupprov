# ============================================================
# DOCKER BACKUP PRO - ECOSISTEMA DE MONITOREO Y DR (HWPERU)
# ============================================================

# 1. CENTRAL API (Control Plane)
# ------------------------------------------------------------
server {
    server_name api.hwperu.com;
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8089;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; 
    # Certificados gestionados por Certbot
    ssl_certificate /etc/letsencrypt/live/api.hwperu.com-0002/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hwperu.com-0002/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.hwperu.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.hwperu.com;
    return 301 https://$host$request_uri;
}

# 3. GRAFANA (Dashboards Ejecutivos)
# ------------------------------------------------------------
server {
    server_name grafana.hwperu.com;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
    # Nota: Correr 'certbot --nginx -d grafana.hwperu.com' para activar SSL
}
