version: '3.8'

services:
  dbp-api:
    build: 
      context: ./api
      dockerfile: Dockerfile

    container_name: dbp-api
    restart: always
    ports:
      - "${API_PORT:-8089}:8089"

    env_file:
      - .env
    environment:
      # Sobrecargamos el host apuntando al nombre del contenedor BD en la red interna de docker
      - DB_HOST=dbp-postgres
    depends_on:
      - dbp-postgres

  dbp-postgres:
    image: postgres:14-alpine
    container_name: dbp-postgres
    restart: always
    env_file:
      - .env
    environment:
      # Variables nativas de la imagen de Postgres
      POSTGRES_USER: ${DB_USER:-dbpuser}
      POSTGRES_PASSWORD: ${DB_PASS:-SecretoSeguro123}
      POSTGRES_DB: ${DB_NAME:-dbp_data}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Evitamos publicar el puerto 5432 externamente por seguridad (la API se conecta internamente)

volumes:
  pgdata:
